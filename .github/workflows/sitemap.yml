name: Generate Sitemap

on:
  push:
    branches:
      - main  # আপনার প্রধান ব্রাঞ্চের নাম master হলে main কেটে master লিখুন

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node 20 Deprecation ওয়ার্নিং এড়ানোর জন্য এটি যুক্ত করা হয়েছে

jobs:
  sitemap_job:
    runs-on: ubuntu-latest
    name: Generate a sitemap
    steps:
    - name: Checkout the repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # নিখুঁত 'lastmod' বা আপডেটের তারিখ পাওয়ার জন্য এটি প্রয়োজন

    - name: Generate the sitemap
      id: sitemap
      uses: cicirello/generate-sitemap@v1
      with:
        base-url-path: https://obaidhqbd.github.io/project-1/

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add sitemap.xml robots.txt || true
        git commit -m "Automated sitemap generation" || echo "No changes to commit"
        git push || echo "Push failed"
